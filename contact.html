<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* NAVBAR */
        nav {
            background: #007bff;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 15px;
            align-items: center;
        }

        nav ul li a, nav button {
            color: white;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        /* CONTACT SECTION */
        .contact-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            padding: 60px 20px;
            flex-wrap: wrap;
        }

        .contact-info {
            max-width: 350px;
        }

        .contact-info h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .contact-info p {
            margin: 10px 0;
            font-size: 16px;
        }

        .contact-form {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .contact-form h2 {
            margin-bottom: 20px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* BEAUTIFUL BUTTON */
        .blue-btn {
            background: linear-gradient(45deg, #007bff, #00c6ff);
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .blue-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,123,255,0.4);
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #222;
            color: white;
        }

        /* DARK MODE */
        .dark {
            background: #121212;
            color: white;
        }

        .dark .contact-form {
            background: #1e1e1e;
        }

        .dark nav {
            background: #111;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>JobPortal</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="faq.html">FAQ</a></li>
        <li><a href="admin.html">Admin</a></li>
        <li><button onclick="toggleMode()">🌙</button></li>
        <li><button onclick="logout()">Logout</button></li>
    </ul>
</nav>

<!-- CONTACT SECTION -->
<section class="contact-container">

    <div class="contact-info">
        <h2>Get in Touch 💬</h2>
        <p>We would love to hear from you!</p>
        <p>📧 support@jobportal.com</p>
        <p>📞 +91 9876543210</p>
        <p>📍 India</p>
    </div>

    <div class="contact-form">
        <h2>Send Message</h2>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" rows="5"></textarea>

            <button type="submit" class="blue-btn">Send Message</button>
        </form>
    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 JobPortal | Designed by You 💙</p>
</footer>

<script>
function logout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}

function toggleMode() {
    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }
}

// APPLY SAVED THEME
let theme = localStorage.getItem("theme");
if(theme === "dark") {
    document.body.classList.add("dark");
}
</script>

</body>
</html>
